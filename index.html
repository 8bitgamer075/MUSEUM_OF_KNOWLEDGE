        /* ============ DEVICE DETECTION ============ */
        function detectMobile() {
            const uaMobile = /Android|iPhone|iPod|Mobile|Windows Phone/i.test(navigator.userAgent);
            // iPadOS 13+ reports its UA as a Mac, so detect it via multi-touch support instead.
            const iPadOS = /Macintosh/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1;
            if (uaMobile || iPadOS) return true;

            const hasTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
            if (!hasTouch) return false;

            // A device's PRIMARY pointer is what matters, not just "has a touchscreen".
            // Touch-screen laptops report hasTouch=true but their primary pointer is
            // still a fine mouse/trackpad, so pointer:coarse will be false for them.
            const primaryIsCoarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
            const primaryIsFine = window.matchMedia && window.matchMedia("(pointer: fine)").matches;
            return primaryIsCoarse && !primaryIsFine;

        /* ============ RENDERER (chunky 32-bit-era 3D look) ============ */
        const canvas = document.getElementById("c");
        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        const PIX_SCALE = 0.5;

        function sizeRenderer() {
            const w = Math.max(150, Math.floor(window.innerWidth * PIX_SCALE));
            const h = Math.max(112, Math.floor(window.innerHeight * PIX_SCALE));
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0620);
        const ROOM = 340;
        scene.fog = new THREE.Fog(0x0b0620, 16, ROOM * 1.15);

        const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 1600);
        camera.position.set(0, 1.7, 0); // spawn dead-center, right under the hub and its orbiting balls
        window.addEventListener("resize", sizeRenderer);

        /* ============ LIGHTING ============ */
        scene.add(new THREE.AmbientLight(0x8888ff, 0.55));

        dl.position.set(10, 25, 10);

        /* ============ FLOOR / ROOM ============ */
        function checkerTexture(c1, c2, size = 8) {
            const cvs = document.createElement("canvas");
            cvs.width = cvs.height = size;
            const ctx = cvs.getContext("2d");
            ctx.fillStyle = c1;
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = c2;
            ctx.fillRect(0, 0, size / 2, size / 2);
            ctx.fillRect(size / 2, size / 2, size / 2, size / 2);
            const tex = new THREE.CanvasTexture(cvs);
            tex.magFilter = THREE.LinearFilter;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }
        const floorTex = checkerTexture("#241454", "#180d3a");
        floorTex.repeat.set(ROOM / 1.1, ROOM / 1.1);
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(ROOM * 3, ROOM * 3),
            new THREE.MeshLambertMaterial({
                map: floorTex
            }),
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ceilTex = checkerTexture("#0c0722", "#100a2c");
        ceilTex.repeat.set(ROOM / 1.1, ROOM / 1.1);
        const ceiling = new THREE.Mesh(
            new THREE.PlaneGeometry(ROOM * 3, ROOM * 3),
            new THREE.MeshLambertMaterial({
                map: ceilTex
            }),
        );
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 11;
        scene.add(ceiling);

        const wallMat = new THREE.MeshLambertMaterial({
            color: 0x1c1240,
            fog: false, // walls were picking up the scene fog same as everything else, and their dark color is close enough to the fog color that they visually blended into the background at a distance - looked "see-through" even though they were always fully opaque
        });
        const SEGS = 36;
        // Each of the 36 wall segments spans ~2*PI*ROOM/36 =~ 59 units - huge.
        // Previously the "gap" worked by skipping one or more WHOLE segments,
        // so the smallest possible opening was ~59 units wide no matter how
        // small GAP_HALF was set - nowhere near doorway-sized, and shifting
        // it only moved which side it ate into rather than shrinking it.
        // Now the wall is built as normal, solid, unbroken chunks, and a
        // separate DOOR_HALF_WIDTH (in real world units, not wall segments)
        // carves a small doorway-sized notch directly out of the two
        // segments that meet at GAP_CENTER - splitting the doorway evenly
        // between both neighboring segments/wings.
        const GAP_CENTER = 0; // back on the seam between Scale of the Universe and Engineering, so the doorway takes equally (and barely) from both sides
        const DOOR_HALF_WIDTH = 0.75; // half-width in world units - about wide enough for one person to walk through comfortably, tight for two side by side
        const GAP_HALF = DOOR_HALF_WIDTH / ROOM; // angular half-width matching the physical doorway, used for player passability too

        function angleDiff(a, b) {
            let d = Math.abs(a - b) % (Math.PI * 2);
            if (d > Math.PI) d = Math.PI * 2 - d;
            return d;
        }

        function angNear(a, target, tol) {
            const twoPi = Math.PI * 2;
            const d = Math.min(Math.abs(a - target), Math.abs(a - target - twoPi), Math.abs(a - target + twoPi));
            return d < tol;
        }

        for (let i = 0; i < SEGS; i++) {
            let a0 = (i / SEGS) * Math.PI * 2,
                a1 = ((i + 1) / SEGS) * Math.PI * 2;
            // if this segment's start or end edge sits at the doorway, pull
            // that edge back so the segment stops right at the doorway frame
            // instead of continuing across it
            if (angNear(a0, GAP_CENTER, GAP_HALF * 1.01)) a0 = GAP_CENTER + GAP_HALF;
            if (angNear(a1, GAP_CENTER, GAP_HALF * 1.01)) a1 = GAP_CENTER - GAP_HALF + Math.PI * 2;
            if (a1 <= a0) continue; // this sliver is entirely the doorway itself
            const x0 = Math.cos(a0) * ROOM,
                z0 = Math.sin(a0) * ROOM;
            const x1 = Math.cos(a1) * ROOM,
                z1 = Math.sin(a1) * ROOM;
            const midx = (x0 + x1) / 2,
                midz = (z0 + z1) / 2;
            const len = Math.hypot(x1 - x0, z1 - z0) + 0.4;
            const seg = new THREE.Mesh(new THREE.BoxGeometry(len, 10, 1), wallMat);
            seg.position.set(midx, 5, midz);
            seg.lookAt(0, 5, 0);
            scene.add(seg);
        }

        /* ============ TEXT TEXTURES ============ */
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(" ");
            let line = "",
                lines = [];
            for (const w of words) {
                const test = line + w + " ";
                if (ctx.measureText(test).width > maxWidth && line) {
                    lines.push(line);
                    line = w + " ";
                } else line = test;
            }
            lines.push(line);
            const startY = y - ((lines.length - 1) * lineHeight) / 2;
            lines.forEach((l, i) => ctx.fillText(l.trim(), x, startY + i * lineHeight));
        }

        function plaqueTexture(title, colorHex) {
            const cvs = document.createElement("canvas");
            cvs.width = 512;
            cvs.height = 128;
            const ctx = cvs.getContext("2d");
            ctx.fillStyle = "#0d0620";
            ctx.fillRect(0, 0, 512, 128);
            ctx.strokeStyle = colorHex;
            ctx.lineWidth = 8;
            ctx.strokeRect(4, 4, 504, 120);
            ctx.fillStyle = colorHex;
            ctx.font = "26px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            wrapText(ctx, title, 256, 64, 476, 30);
            const tex = new THREE.CanvasTexture(cvs);
            tex.magFilter = THREE.LinearFilter;
            return tex;
        }

        function signTexture(title, colorHex) {
            const cvs = document.createElement("canvas");
            cvs.width = 768;
            cvs.height = 192;

            ctx.fillStyle = "#0d0620";

            ctx.strokeStyle = colorHex;

            ctx.strokeRect(6, 6, 756, 180);
            ctx.fillStyle = colorHex;
            ctx.font = "bold 44px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            wrapText(ctx, title, 384, 96, 680, 52);
            const tex = new THREE.CanvasTexture(cvs);
            tex.magFilter = THREE.LinearFilter;
            return tex;

        /* ============ SHAPE LIBRARY (3D representations by concept type) ============ */
        function makeShape(shapeType, color) {
            const mat = (c) =>
                new THREE.MeshLambertMaterial({
                    color: c,
                    flatShading: true,
                    emissive: c,
                    emissiveIntensity: 0.28
                });
            const baseMat = mat(color);
            switch (shapeType) {
                case "sphere":
                    return new THREE.Mesh(new THREE.SphereGeometry(0.72, 8, 6), baseMat);
                case "point":
                    return new THREE.Mesh(new THREE.SphereGeometry(0.32, 6, 5), baseMat);
                case "ring":
                    return new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.22, 6, 10), baseMat);
                case "helix":
                    return new THREE.Mesh(new THREE.TorusKnotGeometry(0.42, 0.15, 64, 8), baseMat);
                case "capsule":
                    return new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 1.25, 8), baseMat);
                case "box":
                    return new THREE.Mesh(new THREE.BoxGeometry(1.05, 1.05, 1.05), baseMat);
                case "cone":
                    return new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.35, 4), baseMat);
                case "disc":
                    return new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.18, 10), baseMat);

                case "atom": {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 6), baseMat));
                    for (let i = 0; i < 3; i++) {
                        const orbit = new THREE.Mesh(new THREE.TorusGeometry(0.62, 0.035, 6, 20), baseMat);
                        orbit.rotation.x = (Math.PI / 2) * (i / 3) + i * 0.9;
                        orbit.rotation.y = i * 1.1;
                        g.add(orbit);
                    }
                    return g;
                }
                case "virusspiky": {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.48, 1), baseMat));
                    for (let i = 0; i < 8; i++) {
                        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.28, 4), baseMat);
                        const phi = Math.acos(1 - (2 * (i + 0.5)) / 8);
                        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
                        const dir = new THREE.Vector3(
                            Math.sin(phi) * Math.cos(theta),
                            Math.cos(phi),
                            Math.sin(phi) * Math.sin(theta),
                        );
                        spike.position.copy(dir.clone().multiplyScalar(0.55));
                        spike.lookAt(dir.clone().multiplyScalar(1.3));
                        spike.rotateX(Math.PI / 2);

                case "rocket": {

                    for (let i = 0; i < 3; i++) {

                case "book": {

        /* ============ BUILD WINGS (arranged rows within pie sectors) ============ */
        const exhibits = [];
        const SECTOR_SPAN = (Math.PI * 2) / WINGS.length;

        // The layout below is fully dynamic so it keeps working correctly no
        // matter how many wings/exhibits exist. Previously MARGIN was a FIXED
        // 0.2 radians on each side of a sector; as more wings got packed into
        // the same 360-degree room, sectors got narrower than 2x that fixed
        // margin, making the "usable" angular space go NEGATIVE - which made
        // exhibits from neighboring wings overlap and clip into each other.
        // Now the margin/columns/radius all scale with the actual wing count.
        const MARGIN_FRAC = 0.05; // fraction of each sector kept clear as a buffer on both sides
        const RADIUS_BASE = 75;
        const MAX_RADIUS = ROOM - 25; // keep the outermost row well clear of the wall/signs/pillars
        const MIN_ARC = 3.0; // minimum spacing (in units) between exhibit centers so pedestals never touch
        const usableFrac = 1 - MARGIN_FRAC * 2;
        const COLS = Math.max(4, Math.min(7, Math.floor((SECTOR_SPAN * usableFrac * RADIUS_BASE) / MIN_ARC)));
        const maxItemsPerWing = Math.max(...WINGS.map((w) => w.items.length));
        const maxRows = Math.ceil(maxItemsPerWing / COLS);
        const RADIUS_STEP = maxRows > 1 ? (MAX_RADIUS - RADIUS_BASE) / (maxRows - 1) : 0;
        const MARGIN = SECTOR_SPAN * MARGIN_FRAC;

        WINGS.forEach((wing, wi) => {
            const sectorStart = wi * SECTOR_SPAN;
            const sectorCenter = sectorStart + SECTOR_SPAN / 2;
            const colorHex = hexStr(wing.color);

            const sign = new THREE.Mesh(
                new THREE.PlaneGeometry(4.8, 1.2),
                new THREE.MeshBasicMaterial({
                    map: signTexture(wing.label, colorHex),
                    transparent: true
                }),
            );
            const signR = ROOM - 2.4;
            sign.position.set(Math.cos(sectorCenter) * signR, 3.6, Math.sin(sectorCenter) * signR);
            sign.lookAt(0, 3.6, 0);
            scene.add(sign);

            [sectorStart, sectorStart + SECTOR_SPAN].forEach((edgeAngle) => {
                if (angleDiff(edgeAngle, GAP_CENTER) < GAP_HALF + 0.1) return; // don't block the secret gap with a pillar
                const pr = ROOM - 3;
                const pillar = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.7, 0.9, 9, 6),
                    new THREE.MeshLambertMaterial({
                        color: 0x241a4d,
                        flatShading: true
                    }),
                );
                pillar.position.set(Math.cos(edgeAngle) * pr, 4.5, Math.sin(edgeAngle) * pr);
                scene.add(pillar);
            });

            const sectorLight = new THREE.PointLight(wing.color, 1.2, 250);
            sectorLight.position.set(Math.cos(sectorCenter) * (ROOM * 0.55), 4, Math.sin(sectorCenter) * (ROOM * 0.55));
            scene.add(sectorLight);

            const n = wing.items.length;
            const usableSpan = SECTOR_SPAN - MARGIN * 2;

            wing.items.forEach((item, i) => {
                const row = Math.floor(i / COLS);
                const col = i % COLS;
                const colsInRow = Math.min(COLS, n - row * COLS);
                const angle = sectorStart + MARGIN + (col + 0.5) * (usableSpan / colsInRow);
                const radius = RADIUS_BASE + row * RADIUS_STEP;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;

                const pedestal = new THREE.Mesh(
                    new THREE.CylinderGeometry(1.0, 1.2, 1.5, 6),
                    new THREE.MeshLambertMaterial({
                        color: 0x2a1c5c,
                        flatShading: true
                    }),
                );
                pedestal.position.set(x, 0.75, z);
                scene.add(pedestal);

                const gem = makeShape(item.shape, wing.color);
                gem.position.set(x, 2.3, z);
                scene.add(gem);

                // FIX: nameplates used to be positioned by scaling (x,z) toward the
                // center by a flat 10% (x*0.9, z*0.9). Since radius grows with each
                // outward row (13 -> 20 -> 27 -> 34...), that 10% became a huge
                // absolute offset for outer rows, so far-out exhibits had their
                // plaques drifting many units away from the actual pedestal/gem.
                // Instead, pull the plaque toward the center by a FIXED distance,
                // so it always sits close to its own exhibit no matter the radius.
                const distXZ = Math.hypot(x, z) || 1;
                const PLAQUE_OFFSET = 1.5;
                const plaqueX = x - (x / distXZ) * PLAQUE_OFFSET;
                const plaqueZ = z - (z / distXZ) * PLAQUE_OFFSET;

                const plaque = new THREE.Mesh(
                    new THREE.PlaneGeometry(2.2, 0.56),
                    new THREE.MeshBasicMaterial({
                        map: plaqueTexture(item.name, colorHex),
                        transparent: true
                    }),
                );
                plaque.position.set(plaqueX, 1.7, plaqueZ);
                plaque.lookAt(0, 1.7, 0);
                scene.add(plaque);

                exhibits.push({
                    wing,
                    item,
                    pos: new THREE.Vector3(x, 0, z),
                    gem,
                    found: false
                });
            });
        });

        /* ============ FLOOR DIVIDER LINES (separate each wing sector) ============ */
        // NOTE: these lines used to fade into invisibility partway to the wall.
        // Cause: they're thin, faint, and span the FULL room radius, so the

        // the farther it is from the camera) washed out the far two-thirds of
        // each line well before it reached the wall - they were only ever
        // "visible" near the hub. Setting fog:false keeps their brightness
        // constant regardless of distance, and the higher opacity/thickness

        const dividerMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,

            // Every boundary gets a line now, including the one nearest the
            // secret gap - the gap is now off-seam from the wing boundaries
            // (see GAP_CENTER above), and leaving every line intact keeps the
            // floor perfectly uniform, so nothing about it gives the secret
            // away. The gap itself is still findable by the pillar that's
            // missing right at the actual opening.
            const length = DIVIDER_OUTER_R - DIVIDER_INNER_R;
            const midR = (DIVIDER_INNER_R + DIVIDER_OUTER_R) / 2;
            const divider = new THREE.Mesh(new THREE.BoxGeometry(length, 0.05, 0.5), dividerMat);
            divider.position.set(Math.cos(edgeAngle) * midR, 0.03, Math.sin(edgeAngle) * midR);
            divider.rotation.y = -edgeAngle;

        /* ============ AUDIO: MUSIC + SFX (synthesized in-browser, no external files) ============ */
        let audioCtx = null;
        let musicGain = null,
            sfxGain = null;
        let musicVolume = 0.35;

        function ensureAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain();
                musicGain.gain.value = musicVolume;
                musicGain.connect(audioCtx.destination);
                sfxGain = audioCtx.createGain();
                sfxGain.gain.value = sfxVolume;
                sfxGain.connect(audioCtx.destination);
                startMusic();
            } catch (e) {
                audioCtx = null;
            }
        }

        // Browsers require a user gesture before audio can play - grab the very first one.
        ["keydown", "mousedown", "touchstart"].forEach((evt) => {
            window.addEventListener(
                evt,
                function firstGesture() {
                    ensureAudio();
                    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
                }, {
                    once: true
                },
            );
        });

        function playTone(freq, dur, type, destGain, startTime, peak) {
            if (!audioCtx || !destGain) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type || "sine";
            osc.frequency.setValueAtTime(freq, startTime);
            g.gain.setValueAtTime(0.0001, startTime);
            g.gain.exponentialRampToValueAtTime(Math.max(peak || 0.3, 0.001), startTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
            osc.connect(g);
            g.connect(destGain);
            osc.start(startTime);
            osc.stop(startTime + dur + 0.05);
        }

        function sfxBlip() {
            if (!audioCtx) return;
            playTone(520, 0.08, "square", sfxGain, audioCtx.currentTime, 0.25);
        }

        function sfxOpen() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            playTone(440, 0.12, "triangle", sfxGain, t, 0.3);
            playTone(660, 0.14, "triangle", sfxGain, t + 0.05, 0.25);
        }

        function sfxClose() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            playTone(500, 0.1, "triangle", sfxGain, t, 0.25);
            playTone(350, 0.12, "triangle", sfxGain, t + 0.05, 0.2);
        }

        function sfxJump() {
            if (!audioCtx) return;
            playTone(300, 0.15, "sawtooth", sfxGain, audioCtx.currentTime, 0.2);
        }

        function sfxFootstep() {
            if (!audioCtx) return;
            playTone(120 + Math.random() * 30, 0.06, "square", sfxGain, audioCtx.currentTime, 0.08);
        }

        function sfxAchievement() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const notes = [523.25, 659.25, 783.99, 1046.5];

        }

        // Gentle generative ambient loop - a slow arpeggio over a minor scale, so
        // the museum always has a soft musical backdrop without any audio files.
        const MUSIC_SCALE = [130.81, 146.83, 164.81, 196.0, 220.0, 246.94, 261.63, 293.66, 329.63, 293.66, 261.63, 246.94, 220.0, 196.0, 164.81, 146.83];
        let musicStep = 0;

        function scheduleMusicLoop() {
            if (!audioCtx || !musicPlaying) return;
            const t = audioCtx.currentTime;
            const noteLen = 1.15;
            const freq = MUSIC_SCALE[musicStep % MUSIC_SCALE.length];
            playTone(freq, noteLen * 1.5, "sine", musicGain, t, 0.14);
            playTone(freq * 2, noteLen * 0.9, "sine", musicGain, t + 0.03, 0.05);
            musicStep++;
            musicTimer = setTimeout(scheduleMusicLoop, noteLen * 1000);
        }

        function startMusic() {
            if (musicPlaying) return;
            musicPlaying = true;

        const interactBtn = document.getElementById("interactBtn");
        const archiveBtn = document.getElementById("archiveBtn");

        function resetJoystick() {
            joyTouchId = null;
            touchMoveX = 0;
            touchMoveZ = 0;
            joystickThumb.style.transform = "translate(0px, 0px)";
        }

        if (IS_MOBILE) {
            joystickBase.addEventListener(
                "touchstart",
                (e) => {
                    e.preventDefault();
                    if (!controlsActive || joyTouchId !== null) return;
                    const t = e.changedTouches[0];
                    joyTouchId = t.identifier;
                    joyStartX = t.clientX;
                    joyStartY = t.clientY;
                }, {
                    passive: false
                },
            );

            document.addEventListener(
                "touchmove",
                (e) => {
                    for (const t of e.changedTouches) {
                        if (t.identifier === joyTouchId) {
                            e.preventDefault();
                            let dx = t.clientX - joyStartX;
                            let dy = t.clientY - joyStartY;
                            const dist = Math.hypot(dx, dy);
                            if (dist > JOY_RADIUS) {
                                dx = (dx / dist) * JOY_RADIUS;
                                dy = (dy / dist) * JOY_RADIUS;
                            }
                            joystickThumb.style.transform = `translate(${dx}px, ${dy}px)`;
                            touchMoveX = dx / JOY_RADIUS;
                            touchMoveZ = -dy / JOY_RADIUS;
                        }
                    }
                }, {
                    passive: false
                },
            );

            document.addEventListener("touchend", (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === joyTouchId) resetJoystick();
                    if (t.identifier === lookTouchId) lookTouchId = null;
                }
            });
            document.addEventListener("touchcancel", (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === joyTouchId) resetJoystick();
                    if (t.identifier === lookTouchId) lookTouchId = null;
                }
            });

            lookZone.addEventListener(
                "touchstart",
                (e) => {
                    if (!controlsActive || lookTouchId !== null) return;
                    const t = e.changedTouches[0];
                    lookTouchId = t.identifier;
                    lookLastX = t.clientX;
                    lookLastY = t.clientY;
                }, {
                    passive: true
                },
            );

            lookZone.addEventListener(
                "touchmove",
                (e) => {
                    for (const t of e.changedTouches) {
                        if (t.identifier === lookTouchId) {
                            const dx = t.clientX - lookLastX;
                            const dy = t.clientY - lookLastY;
                            lookLastX = t.clientX;
                            lookLastY = t.clientY;
                            yaw -= dx * LOOK_SENS_X * sensMult;
                            pitch -= dy * LOOK_SENS_Y * sensMult;
                            pitch = Math.max(-1.2, Math.min(1.2, pitch));
                        }
                    }
                }, {
                    passive: true
                },
            );

            const setSpace = (val) => (e) => {
                e.preventDefault();
                keys["Space"] = val;
            };
            jumpBtn.addEventListener("touchstart", setSpace(true), {
                passive: false
            });
            jumpBtn.addEventListener("touchend", setSpace(false));
            jumpBtn.addEventListener("touchcancel", setSpace(false));

            interactBtn.addEventListener(
                "touchstart",
                (e) => {
                    e.preventDefault();
                    tryInteract();
                }, {
                    passive: false
                },
            );

            archiveBtn.addEventListener("click", toggleToolbar);

            document.getElementById("hint").textContent = "TAP INTERACT TO EXAMINE";
        }

        /* ============ TOOLBAR / MODAL LOGIC ============ */
        const toolbar = document.getElementById("toolbar");
        const settingsPanel = document.getElementById("settingsPanel");

        function refreshControlsActive() {
            controlsActive = !toolbar.classList.contains("open") && !modalOpen && settingsPanel.style.display !== "block" && !tutorialOpen;
        }

        function toggleToolbar() {
            toolbar.classList.toggle("open");
            sfxBlip();
            refreshControlsActive();
        }

        const modal = document.getElementById("modal");
        let modalOpen = false;
        document.getElementById("mClose").addEventListener("click", closeModal);

        function closeModal() {
            modal.style.display = "none";
            modalOpen = false;
            sfxClose();
            refreshControlsActive();
        }

        let foundCount = 0;

        function tryInteract() {
            if (modalOpen) {
                closeModal();
                return;
            }
            const camPos = camera.position;

            const secretDist = Math.hypot(camPos.x - secretExhibit.pos.x, camPos.z - secretExhibit.pos.z);
            let nearest = null,
                nd = Infinity;
            exhibits.forEach((ex) => {
                const d = Math.hypot(camPos.x - ex.pos.x, camPos.z - ex.pos.z);
                if (d < nd) {
                    nd = d;
                    nearest = ex;
                }
            });

            if (secretDist < 4.0 && secretDist < nd) {
                document.getElementById("mCat").textContent = "??? SECRET ???";
                document.getElementById("mCat").style.color = "#ffd94a";
                document.getElementById("mTitle").textContent = "THE CREATOR'S SECRET";
                document.getElementById("mDesc").textContent =
                    "You found the hidden edge of the museum! This whole place was imagined by an 11-year-old dreamer and built together with Claude, an AI assistant, in the summer of 2026. Thanks for exploring every corner - now go show someone what you built!";
                modal.style.display = "flex";
                modalOpen = true;
                sfxOpen();
                refreshControlsActive();
                if (!secretExhibit.found) {
                    secretExhibit.found = true;
                    secretFound = true;
                    checkAchievements();
                }
                return;
            }

            if (nearest && nd < 4.0) {
                document.getElementById("mCat").textContent = nearest.wing.label;
                document.getElementById("mCat").style.color = hexStr(nearest.wing.color);
                document.getElementById("mTitle").textContent = nearest.item.name;
                document.getElementById("mDesc").textContent = nearest.item.desc;
                modal.style.display = "flex";
                modalOpen = true;
                sfxOpen();
                refreshControlsActive();
                if (!nearest.found) {
                    nearest.found = true;
                    foundCount++;
                    document.getElementById("counter").textContent = foundCount + " / " + exhibits.length + " FOUND";
                    const entry = document.getElementById("entry" + nearest.idx);
                    entry.classList.add("found");
                    entry.querySelector(".mark").textContent = "\u2713";
                    checkAchievements();
                }
            }
        }

        /* ============ SETTINGS PANEL ============ */
        const gearBtn = document.getElementById("gearBtn");
        gearBtn.addEventListener("click", () => {
            const isOpen = settingsPanel.style.display === "block";
            settingsPanel.style.display = isOpen ? "none" : "block";
            refreshControlsActive();
        });
        const sensSlider = document.getElementById("sensSlider");
        const sensVal = document.getElementById("sensVal");
        sensSlider.addEventListener("input", () => {
            sensMult = parseFloat(sensSlider.value);
            sensVal.textContent = sensMult.toFixed(1) + "x";
        });

        const musicSlider = document.getElementById("musicSlider");
        const musicVal = document.getElementById("musicVal");
        musicSlider.addEventListener("input", () => {
            musicVolume = parseFloat(musicSlider.value);
            musicVal.textContent = Math.round(musicVolume * 100) + "%";
            if (musicGain) musicGain.gain.value = musicVolume;
        });

        const sfxSlider = document.getElementById("sfxSlider");
        const sfxVal = document.getElementById("sfxVal");
        sfxSlider.addEventListener("input", () => {
            sfxVolume = parseFloat(sfxSlider.value);
            sfxVal.textContent = Math.round(sfxVolume * 100) + "%";
            if (sfxGain) sfxGain.gain.value = sfxVolume;
        });

        document.getElementById("replayTutorial").addEventListener("click", () => {
            settingsPanel.style.display = "none";
            openTutorial();
        });

        /* ============ TUTORIAL ============ */
        const TUTORIAL_SLIDES = IS_MOBILE ?
            [{
                    h: "MUSEUM OF<br>KNOWLEDGE",
                    body: "<p>A pixelated 3D hall with 23 wings of knowledge: Scale of the Universe, History, Microbiology, Astronomy, Fun Facts, Computer Science, Arts, Biology, Mathematics, Physics, Anatomy, Genetics, Geology, Geography, Logic, Philosophy, Law, Chemistry, Paleontology, Archaeology, Engineering, and Economics.</p>",
                },
                {
                    h: "MOVE AROUND",
                    body: "<p>Use the joystick in the bottom-left corner of the screen to walk through the museum. Push it in any direction to move that way.</p>",
                },
                {
                    h: "LOOK AROUND",
                    body: "<p>Drag your finger anywhere on the right side of the screen to turn and look around.</p>",
                },
                {
                    h: "JUMP",
                    body: "<p>Tap the round JUMP button in the bottom-right to hop.</p>",
                },
                {
                    h: "INTERACT & ARCHIVE",
                    body: "<p>Walk up to a glowing exhibit and tap INTERACT to read about it. Tap the book icon top-left anytime to open your archive and see achievements and what you've found.</p>",
                },
                {
                    h: "SECRETS & SETTINGS",
                    body: "<p>There's a hidden secret somewhere beyond the museum's outer wall - explore carefully! Tap the gear icon top-left anytime to adjust look sensitivity, music, SFX volume, or replay this tutorial.</p>",
                },
            ] :
            [{
                    h: "MUSEUM OF<br>KNOWLEDGE",
                    body: "<p>A pixelated 3D hall with 23 wings of knowledge: Scale of the Universe, History, Microbiology, Astronomy, Fun Facts, Computer Science, Arts, Biology, Mathematics, Physics, Anatomy, Genetics, Geology, Geography, Logic, Philosophy, Law, Chemistry, Paleontology, Archaeology, Engineering, and Economics.</p>",
                },
                {
                    h: "MOVE AROUND",
                    body: "<p>Use these keys to walk through the museum:</p><div><span class='keyTag'>W</span><span class='keyTag'>A</span><span class='keyTag'>S</span><span class='keyTag'>D</span></div>",
                },
                {
                    h: "LOOK AROUND",
                    body: "<p>Move your mouse cursor toward the edge of the screen and your view turns that way - like a joystick. No clicking needed.</p>",
                },
                {
                    h: "JUMP",
                    body: "<p>Press the spacebar to hop.</p><div><span class='keyTag'>SPACE</span></div>"
                },
                {
                    h: "INTERACT & ARCHIVE",
                    body: "<p>Walk up to a glowing exhibit and press F to read about it. Press E anytime to open your archive and see achievements and what you've found.</p><div><span class='keyTag'>F interact</span> &nbsp; <span class='keyTag'>E archive</span></div>",
                },
                {
                    h: "SECRETS & SETTINGS",
                    body: "<p>There's a hidden secret somewhere beyond the museum's outer wall - explore carefully! Click the gear icon top-left anytime to adjust look sensitivity, music, SFX volume, or replay this tutorial.</p>",
                },
            ];
        let slideIdx = 0;
        let tutorialOpen = true;
        const tutorialEl = document.getElementById("tutorial");
        const slideBody = document.getElementById("slideBody");
        const dotsEl = document.getElementById("dots");
        const navRow = document.getElementById("navRow");

        function renderSlide() {
            const s = TUTORIAL_SLIDES[slideIdx];
            slideBody.innerHTML = `<h1>${s.h}</h1>${s.body}`;
            dotsEl.innerHTML = TUTORIAL_SLIDES.map(
                (_, i) => `<span class="dot ${i === slideIdx ? "on" : ""}"></span>`,
            ).join("");
            navRow.innerHTML = "";
            if (slideIdx > 0) {
                const back = document.createElement("button");
                back.className = "secondary";
                back.textContent = "BACK";
                back.onclick = () => {
                    slideIdx--;
                    renderSlide();
                };
                navRow.appendChild(back);
            }
            const next = document.createElement("button");
            next.textContent = slideIdx === TUTORIAL_SLIDES.length - 1 ? "START EXPLORING" : "NEXT";
            next.onclick = () => {
                if (slideIdx === TUTORIAL_SLIDES.length - 1) closeTutorial();
                else {
                    slideIdx++;
                    renderSlide();
                }
            };
            navRow.appendChild(next);
        }

        function openTutorial() {
            slideIdx = 0;
            tutorialOpen = true;
            tutorialEl.style.display = "flex";
            refreshControlsActive();
            renderSlide();
        }

        function closeTutorial() {
            tutorialEl.style.display = "none";
            tutorialOpen = false;
            document.getElementById("hint").style.display = "block";
            document.getElementById("zoneLabel").style.display = "block";
            gearBtn.style.display = "block";
            refreshControlsActive();
        }
        renderSlide();

        /* ============ MOVEMENT / COLLISION ============ */
        const clock = new THREE.Clock();
        let footstepClock = 0;

        function currentWing(x, z) {
            let angle = Math.atan2(z, x);
            if (angle < 0) angle += Math.PI * 2;
            const idx = Math.floor(angle / SECTOR_SPAN) % WINGS.length;
            return WINGS[idx];
        }
        const DEADZONE = 0.04;

        function updatePlayer(dt) {
            if (controlsActive && !IS_MOBILE) {
                let nx = mouseNX,
                    ny = mouseNY;
                if (Math.abs(nx) < DEADZONE) nx = 0;
                if (Math.abs(ny) < DEADZONE) ny = 0;
                yaw -= nx * nx * Math.sign(nx) * BASE_TURN * sensMult * dt;
                pitch -= ny * ny * Math.sign(ny) * BASE_TURN_V * sensMult * dt;
                pitch = Math.max(-1.2, Math.min(1.2, pitch));
            }

            const forward = new THREE.Vector3(Math.sin(yaw) * -1, 0, Math.cos(yaw) * -1);
            const right = new THREE.Vector3(-forward.z, 0, forward.x);
            const move = new THREE.Vector3();
            if (controlsActive) {
                if (keys["KeyW"]) move.add(forward);
                if (keys["KeyS"]) move.sub(forward);
                if (keys["KeyD"]) move.add(right);
                if (keys["KeyA"]) move.sub(right);
                if (IS_MOBILE) {
                    move.add(forward.clone().multiplyScalar(touchMoveZ));
                    move.add(right.clone().multiplyScalar(touchMoveX));
                }
            }
            if (move.lengthSq() > 1) {
                move.normalize();
            }
            const isMoving = move.lengthSq() > 0.0001;
            if (isMoving) {
                move.multiplyScalar(SPEED * dt);
            }

            let nx2 = camera.position.x + move.x;
            let nz2 = camera.position.z + move.z;

            exhibits.forEach((ex) => {
                const dx = nx2 - ex.pos.x,
                    dz = nz2 - ex.pos.z;
                const dist = Math.hypot(dx, dz);
                const minD = 1.6;
                if (dist < minD && dist > 0.0001) {
                    nx2 = ex.pos.x + (dx / dist) * minD;
                    nz2 = ex.pos.z + (dz / dist) * minD;
                }
            });

            const distFromCenter = Math.hypot(nx2, nz2);
            let angleAtPoint = Math.atan2(nz2, nx2);
            if (angleAtPoint < 0) angleAtPoint += Math.PI * 2;
            // The doorway itself (GAP_HALF) stays exactly as narrow as it is -
            // squeezing THROUGH the wall is unchanged. But this used to also
            // force that same razor-thin angle for the ENTIRE trip out to the
            // secret exhibit and back, so any sideways step out there yanked
            // you straight back through the wall - there was no room to move.
            // Now the allowed angle widens out the further past the wall you
            // are, opening into a small pocket, while still narrowing back
            // down to the real doorway width right at the wall so you can't
            // just walk through it anywhere else.
            const POCKET_HALF = 0.09; // angular half-width of the open pocket area beyond the wall - widened for a more comfortable buffer
            const widenDist = 5; // widen out fully within this many units of stepping past the wall
            const t = Math.max(0, Math.min(1, (distFromCenter - ROOM) / widenDist));
            const allowedHalf = GAP_HALF + (POCKET_HALF - GAP_HALF) * t;
            const inGap = angleDiff(angleAtPoint, GAP_CENTER) < allowedHalf;
            const maxR = inGap ? ROOM + 12 : ROOM - 1.4;
            if (distFromCenter > maxR) {
                const s = maxR / distFromCenter;
                nx2 *= s;
                nz2 *= s;
            }
            camera.position.x = nx2;
            camera.position.z = nz2;

            if (controlsActive && keys["Space"] && grounded) {
                velY = JUMP;
                grounded = false;
                sfxJump();
            }
            velY -= GRAV * dt;
            camera.position.y += velY * dt;
            if (camera.position.y <= EYE) {
                camera.position.y = EYE;
                velY = 0;
                grounded = true;
            }

            // Footstep SFX: only while actually walking on the ground, throttled
            // so it clicks along at a natural walking cadence instead of every frame.
            if (isMoving && grounded && controlsActive) {
                footstepClock += dt;
                if (footstepClock >= 0.32) {
                    footstepClock = 0;
                    sfxFootstep();
                }
            } else {
                footstepClock = 0.16;
            }

            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            let near = false;
            exhibits.forEach((ex) => {
                if (Math.hypot(camera.position.x - ex.pos.x, camera.position.z - ex.pos.z) < 4.0) near = true;
            });
            if (Math.hypot(camera.position.x - secretExhibit.pos.x, camera.position.z - secretExhibit.pos.z) < 4.0)
                near = true;
            document.getElementById("hint").style.opacity = near ? "1" : ".35";

            // Bug fix: this used to be purely angle-based with no minimum
            // distance from center, so standing at the hub (spawn point)
            // already counted as "being in" whatever wing your spawn angle
            // happened to point toward - marking it visited and showing its
            // label immediately, before you'd walked anywhere. HUB_RADIUS
            // carves out a neutral zone around the hub/orbiting balls where
            // no wing is active at all.
            const HUB_RADIUS = 8;
            const zl = document.getElementById("zoneLabel");
            if (distFromCenter <= HUB_RADIUS) {
                zl.style.display = "none";
            } else if (distFromCenter <= ROOM) {
                const w = currentWing(camera.position.x, camera.position.z);
                visitedWings.add(w.key);
                zl.style.display = "block";
                zl.textContent = w.label;
                zl.style.color = hexStr(w.color);
                zl.style.borderColor = hexStr(w.color);
            } else {
                zl.style.display = "block";
                zl.textContent = "??? UNKNOWN AREA";
                zl.style.color = "#ffd94a";
                zl.style.borderColor = "#ffd94a";
            }
        }

        /* ============ ANIMATE ============ */
        sizeRenderer();

        let fpsFrames = 0,
            fpsElapsed = 0;
        const fpsEl = document.getElementById("fpsCounter");

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            updatePlayer(dt);
            exhibits.forEach((ex) => (ex.gem.rotation.y += dt * 0.8));
            hubGroup.rotation.y += dt * 0.4;
            secretCore.rotation.y += dt * 0.6;
            secretCore.rotation.x += dt * 0.3;
            if (visitedWings.size !== lastVisitedCount) {
                lastVisitedCount = visitedWings.size;
                checkAchievements();
            }
            renderer.render(scene, camera);

            fpsFrames++;
            fpsElapsed += dt;
            if (fpsElapsed >= 0.5) {
                const fps = Math.round(fpsFrames / fpsElapsed);
                if (fpsEl) fpsEl.textContent = "FPS: " + fps;
                fpsFrames = 0;
                fpsElapsed = 0;
            }
        }
        animate();
    </script>
</body>

</html>
